<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Swadakta brand mark</title>
  <desc id="desc">A calm circular Swadakta mark showing two sides connected by an S-shaped bridge.</desc>
  <defs>
    <linearGradient id="ring" x1="10" y1="12" x2="86" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a73e8"/>
      <stop offset="0.52" stop-color="#34a853"/>
      <stop offset="1" stop-color="#fbbc04"/>
    </linearGradient>
    <linearGradient id="bridge" x1="24" y1="24" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1324"/>
      <stop offset="0.5" stop-color="#1a73e8"/>
      <stop offset="1" stop-color="#0f9d58"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#102050" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect x="4" y="4" width="88" height="88" rx="26" fill="#ffffff"/>
  <circle cx="48" cy="48" r="35" fill="#f7fbff" stroke="url(#ring)" stroke-width="5"/>
  <path d="M29 30c8-8 24-9 31-1 6 7 2 15-10 18-13 3-18 9-12 16 7 8 23 7 31-1" fill="none" stroke="url(#bridge)" stroke-width="8" stroke-linecap="round"/>
  <g filter="url(#softShadow)">
    <circle cx="26" cy="30" r="9" fill="#1a73e8"/>
    <circle cx="70" cy="66" r="9" fill="#34a853"/>
  </g>
  <path d="M25 66c9 3 19 1 25-6M71 30c-9-3-19-1-25 6" fill="none" stroke="#fbbc04" stroke-width="4" stroke-linecap="round"/>
</svg>
