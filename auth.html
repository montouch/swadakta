<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swadakta Account Access</title>
    <meta
      name="description"
      content="Confirm your Swadakta account access and continue to the right portal."
    />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#0f332c" />
    <link rel="stylesheet" href="styles.css?v=28" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/favicon.svg" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="application-name" content="Swadakta" /></head>
  <body class="auth-body">
    <main class="auth-shell" aria-labelledby="auth-title">
      <section class="auth-panel">
        <a class="brand" href="index.html" aria-label="Swadakta home">
          <img class="brand-mark" src="assets/swadakta-brand-mark.svg" alt="" aria-hidden="true" />
          <span>
            <strong>Swadakta</strong>
            <small>Account access</small>
          </span>
        </a>

        <div class="auth-copy">
          <p class="eyebrow">Secure sign-in</p>
          <h1 id="auth-title">Opening your Swadakta account.</h1>
          <p id="auth-message">
            Checking your account access. Keep this tab open while Swadakta confirms the session.
          </p>
        </div>

        <div class="auth-status-card" id="auth-status-card" role="status" aria-live="polite">
          <strong>Checking account...</strong>
          <span>Secure email confirmations work best in the same browser that requested them.</span>
        </div>

        <form class="auth-form password-reset-form" id="password-reset-form" hidden>
          <label class="field-group" for="new-password">
            New password
            <input id="new-password" name="newPassword" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <button class="button button-primary" type="submit">Save new password</button>
          <p class="copy-status" id="password-reset-status" role="status"></p>
        </form>

        <nav class="auth-actions" aria-label="Account destinations">
          <a class="button button-primary" id="auth-continue" href="portal.html">Continue</a>
          <a class="button button-secondary" href="portal.html">Portal</a>
          <a class="button button-secondary" href="admin.html">Admin</a>
        </nav>
      </section>
    </main>

    <script src="app-config.js?v=4"></script>
    <script src="app-data.js?v=45"></script>
    <script src="auth.js?v=10"></script>
  <script src="assistant-dock.js?v=4"></script>
</body>
</html>
