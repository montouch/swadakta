name: Production Health

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to check"
        required: false
        default: "https://swadakta.com"

jobs:
  production-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check launch readiness without desktop visual pass
        run: node scripts/check-launch-ready.mjs "${{ inputs.base_url }}" --skip-visual
        env:
          SWADAKTA_BASE_URL: ${{ inputs.base_url }}
